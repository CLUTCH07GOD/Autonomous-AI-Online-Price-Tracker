services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-price_intelligence}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pass123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD:-pass123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build:
      context: ./apps/backend
    env_file:
      - .env
    depends_on:
      - redis
      - db
    volumes:
      - ./apps/backend:/app
    command: celery -A app.jobs.celery_app.celery_app worker --loglevel=INFO

  scheduler:
    build:
      context: ./apps/backend
    env_file:
      - .env
    depends_on:
      - redis
      - db
    volumes:
      - ./apps/backend:/app
    command: celery -A app.jobs.celery_app.celery_app beat --loglevel=INFO

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
